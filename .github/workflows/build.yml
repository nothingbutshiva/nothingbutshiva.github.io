name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create pages output directory
        run: mkdir -p pages

      - name: Convert Markdown to HTML
        run: |
          for file in markdown/*.md; do
            [ -f "$file" ] || continue
            basename=$(basename "$file" .md)
            echo "Converting $file -> pages/${basename}.html"
            pandoc "$file" \
              --template=markdown/template.html \
              --standalone \
              --metadata title-prefix="Nothing But Shiva" \
              -o "pages/${basename}.html"
          done

      - name: Generate sitemap
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > sitemap.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://nothingbutshiva.github.io/</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://nothingbutshiva.github.io/articles/</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>weekly</changefreq>
              <priority>0.8</priority>
            </url>
          EOF
          for file in pages/*.html; do
            [ -f "$file" ] || continue
            basename=$(basename "$file")
            cat >> sitemap.xml <<ENTRY
            <url>
              <loc>https://nothingbutshiva.github.io/pages/${basename}</loc>
              <lastmod>${TODAY}</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.6</priority>
            </url>
          ENTRY
          done
          echo "</urlset>" >> sitemap.xml
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' sitemap.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
