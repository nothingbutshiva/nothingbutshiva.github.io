name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Create pages output directory
        run: mkdir -p pages

      - name: Convert Markdown to HTML
        run: |
          for file in markdown/*.md; do
            [ -f "$file" ] || continue
            basename=$(basename "$file" .md)
            echo "Converting $file -> pages/${basename}.html"
            pandoc "$file" \
              --template=markdown/template.html \
              --standalone \
              --metadata title-prefix="Nothing But Shiva" \
              -o "pages/${basename}.html"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ github.event.repository.html_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
