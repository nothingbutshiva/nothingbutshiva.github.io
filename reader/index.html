<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Read Online — Nothing But Shiva</title>
  <meta name="description" content="Read sacred books online with the Nothing But Shiva reader. Free access to spiritual literature.">
  <meta property="og:title" content="Read Online — Nothing But Shiva">
  <meta property="og:description" content="Read sacred books on Lord Shiva and Hindu spirituality online for free.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="../assets/images/om-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #2a2a2e; }
    [data-theme="light"] body { background: #e8e4df; }
    nav.site-nav { position: relative; padding: 0.3rem 1rem; }

    /* Book Reader Layout */
    .book-reader {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      user-select: none;
    }

    /* Top toolbar */
    .reader-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      background: var(--pico-card-background-color, #fff);
      border-bottom: 1px solid rgba(15, 20, 25, 0.08);
      flex-wrap: wrap;
      z-index: 50;
      min-height: 36px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .reader-toolbar button {
      background: none;
      border: 1px solid rgba(15, 20, 25, 0.1);
      border-radius: 6px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: all 0.2s;
      color: var(--text-primary);
      font-family: var(--font-body);
    }

    .reader-toolbar button:hover {
      border-color: var(--brand-accent);
      background: rgba(212, 165, 116, 0.08);
    }

    .reader-toolbar button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .reader-toolbar button.active {
      background: var(--brand-primary);
      color: #fff;
      border-color: var(--brand-primary);
    }

    .page-info {
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      color: var(--text-secondary);
    }

    .page-info input {
      width: 38px;
      text-align: center;
      padding: 0.2rem;
      border: 1px solid rgba(15, 20, 25, 0.12);
      border-radius: 4px;
      font-size: 0.78rem;
      margin: 0;
      font-family: var(--font-body);
    }

    .book-title {
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
      color: var(--text-primary);
    }

    .back-link {
      text-decoration: none;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--brand-accent); }

    /* Book viewport */
    .book-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      perspective: 1800px;
    }

    /* The book container */
    .book-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    /* Book spread */
    .book-spread {
      display: flex;
      position: relative;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }

    /* Individual page */
    .book-page {
      position: relative;
      background: #faf8f5;
      overflow: hidden;
    }

    [data-theme="dark"] .book-page {
      background: #1e1e22;
    }

    .book-page canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .book-page.page-left {
      border-radius: 4px 0 0 4px;
      box-shadow: inset -20px 0 30px -15px rgba(0, 0, 0, 0.12);
    }

    .book-page.page-right {
      border-radius: 0 4px 4px 0;
      box-shadow: inset 20px 0 30px -15px rgba(0, 0, 0, 0.12);
    }

    /* Book spine center line */
    .book-spine {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.15), rgba(0,0,0,0.05), rgba(0,0,0,0.15));
      z-index: 10;
      pointer-events: none;
    }

    /* Page turn animation */
    .book-page.turning {
      animation: pageTurn 0.45s ease-in-out;
      transform-origin: left center;
    }

    .book-page.turning-back {
      animation: pageTurnBack 0.45s ease-in-out;
      transform-origin: right center;
    }

    @keyframes pageTurn {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(-85deg); box-shadow: 10px 0 40px rgba(0,0,0,0.3); }
      100% { transform: rotateY(0deg); }
    }

    @keyframes pageTurnBack {
      0%   { transform: rotateY(0deg); }
      50%  { transform: rotateY(85deg); box-shadow: -10px 0 40px rgba(0,0,0,0.3); }
      100% { transform: rotateY(0deg); }
    }

    /* Navigation arrows */
    .page-nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 15%;
      min-width: 60px;
      cursor: pointer;
      z-index: 20;
      display: flex;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .page-nav-zone:hover { opacity: 1; }

    .page-nav-zone.prev {
      left: 0;
      justify-content: flex-start;
      padding-left: 1rem;
      background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
    }

    .page-nav-zone.next {
      right: 0;
      justify-content: flex-end;
      padding-right: 1rem;
      background: linear-gradient(to left, rgba(0,0,0,0.06), transparent);
    }

    .page-nav-zone .nav-arrow {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--brand-primary);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }

    [data-theme="dark"] .page-nav-zone .nav-arrow {
      background: rgba(30,30,34,0.9);
      color: var(--brand-accent);
    }

    .page-nav-zone:hover .nav-arrow { transform: scale(1.1); }

    /* Page number overlay */
    .page-number-overlay {
      position: absolute;
      bottom: 12px;
      font-size: 0.75rem;
      color: rgba(0,0,0,0.3);
      font-family: var(--font-heading);
      pointer-events: none;
    }

    .page-left .page-number-overlay { left: 16px; }
    .page-right .page-number-overlay { right: 16px; }

    [data-theme="dark"] .page-number-overlay { color: rgba(255,255,255,0.2); }

    /* Loading */
    .reader-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(245, 243, 240, 0.95);
      z-index: 40;
      gap: 1rem;
    }

    [data-theme="dark"] .reader-loading {
      background: rgba(15, 20, 25, 0.95);
    }

    .progress-bar {
      width: 200px;
      height: 3px;
      background: rgba(15, 20, 25, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--brand-accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    #reader-error {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Single-page mode */
    .book-reader.single-mode .book-page.page-left,
    .book-reader.single-mode .book-spine {
      display: none;
    }

    .book-reader.single-mode .book-page.page-right {
      border-radius: 4px;
      box-shadow: none;
    }

    /* Mobile: force single page */
    @media (max-width: 768px) {
      .book-page.page-left, .book-spine { display: none !important; }
      .book-page.page-right { border-radius: 4px !important; box-shadow: none !important; }
      .book-title { max-width: 140px; }
      .reader-toolbar { padding: 0.4rem 0.5rem; }
      .page-nav-zone { width: 20%; }
    }
  </style>
</head>
<body>

  <!-- Minimal Navigation -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="../" class="nav-brand">
        <img src="../assets/images/om-icon.svg" class="brand-om" width="22" height="22" alt="Om">
        Nothing But Shiva
      </a>
      <button class="theme-toggle" aria-label="Toggle dark mode">&#x1F319;</button>
    </div>
  </nav>

  <!-- Book Reader -->
  <div class="book-reader" id="book-reader">

    <!-- Toolbar -->
    <div class="reader-toolbar">
      <div class="toolbar-group">
        <a href="../" class="back-link">&larr; Back</a>
        <span class="book-title" id="book-title-el">PDF Document</span>
      </div>

      <div class="toolbar-group">
        <button id="prev-page" title="Previous page" disabled>&#9664; Prev</button>
        <div class="page-info">
          <input type="number" id="page-input" value="1" min="1" aria-label="Page number">
          <span>/</span>
          <span id="page-count">-</span>
        </div>
        <button id="next-page" title="Next page" disabled>Next &#9654;</button>
      </div>

      <div class="toolbar-group">
        <button id="zoom-out" title="Zoom out">&minus;</button>
        <span id="zoom-level" style="font-size:0.78rem;color:var(--text-secondary);min-width:32px;text-align:center;">100%</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="view-mode" title="Toggle single/spread view">&#x1F4D6;</button>
        <button id="fullscreen-btn" title="Fullscreen (F)">&#x26F6;</button>
      </div>
    </div>

    <!-- Book Viewport -->
    <div class="book-viewport" id="book-viewport">

      <!-- Click zones -->
      <div class="page-nav-zone prev" id="nav-prev">
        <div class="nav-arrow">&#9664;</div>
      </div>
      <div class="page-nav-zone next" id="nav-next">
        <div class="nav-arrow">&#9654;</div>
      </div>

      <!-- The book -->
      <div class="book-container">
        <div class="book-spread" id="book-spread">
          <div class="book-page page-left" id="page-left">
            <canvas id="canvas-left"></canvas>
            <div class="page-number-overlay" id="pagenum-left"></div>
          </div>
          <div class="book-spine" id="book-spine"></div>
          <div class="book-page page-right" id="page-right">
            <canvas id="canvas-right"></canvas>
            <div class="page-number-overlay" id="pagenum-right"></div>
          </div>
        </div>
      </div>

      <!-- Loading Overlay -->
      <div class="reader-loading" id="loading-overlay">
        <div class="spinner"></div>
        <span class="loading-text" id="loading-text">Loading PDF&hellip;</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Error -->
      <div id="reader-error" style="display:none;position:absolute;inset:0;background:var(--pico-background-color);"></div>
    </div>

  </div>

  <!-- PDF.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="reader.js"></script>
</body>
</html>
